services:
  - type: web
    name: herramienta-precios
    env: python
    pythonVersion: "3.11.9"
    buildCommand: bash build.sh
    startCommand: uvicorn servidor:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/.playwright
